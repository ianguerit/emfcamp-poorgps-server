<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Poor GPS</title>
  </head>
  <body>
    <div class="container">

<nav class="navbar navbar-expand-lg" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Poor GPS</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/test">Test</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/">Map</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/scanner">Calibrate</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

    <div class="row">

        <div class="col-md-6">
            <h3>API calls</h3>
            <div class="card">
                <div class="card-header">Poor GPS query</div>
                <div class="card-body">
                    <form action="/api/whereami" method="post" id="whereami" onsubmit="api('/api/whereami', document.getElementById('whereami-data').value); return false;">
                        <p><code>POST /api/whereami</code></p>
                        <div class="mb-3">
                            <label>Request body</label>
                            <textarea name="whereami-data" id="whereami-data" class="form-control">
{
    "device_id":"thisisjustatest",
    "networks":[
        {
            "ssid":"SKYS8T1B",
            "bssid":"00:a3:88:d4:12:42",
            "rssi":-40
        }
    ]
}
                            </textarea>
                        </div>
                        <button class="btn btn-success float-end" type="submit">Test</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <h3>Test details</h3>
            <div class="card">
                <div class="card-body">
                    <div><pre><code id="sent-url"></code></pre></div>
                    <div class="mb-3"><pre><code id="sent-body"></code></pre></div>

                    <div><pre><code id="response-headers"></code></pre></div>
                    <div><pre><code id="response"></code></pre></div>
                </div>
            </div>
        </div>

    </div>

    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->

    <script type="text/javascript">
        function api(url, requestbody) {
            document.getElementById('sent-url').innerHTML = 'POST ' + url;
            document.getElementById('sent-body').innerHTML = requestbody;
            document.getElementById('response-headers').innerHTML = '';
            document.getElementById('response').innerHTML = '';
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: requestbody // JSON.stringify(data)
            }).then((response) => {
                document.getElementById('response-headers').innerHTML = `HTTP/1.1 ${response.status} ${response.statusText}`;
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            }).then((text) => {
                document.getElementById('response').innerHTML = text;
            }).catch((error) => {

            });
        }
    </script>
  </body>
</html>
